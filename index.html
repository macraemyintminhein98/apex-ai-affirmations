<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AffirmFlow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white bg-opacity-10 backdrop-filter backdrop-blur-lg rounded-xl shadow-2xl p-8 transform hover:scale-105 transition-transform duration-300">
        <h1 class="text-4xl font-extrabold text-center mb-6 drop-shadow-lg">AffirmFlow ✨</h1>
        <p class="text-center text-lg mb-8 opacity-90">Your daily dose of AI-powered positivity.</p>
        <div class="space-y-4">
            <p class="text-center text-md">Get 5 unique, personalized affirmations every day!</p>
            <p class="text-center text-md">Select themes like Career, Health, or Relationships.</p>
        </div>
        <div class="mt-8 text-center">
            <button class="px-8 py-3 bg-white text-indigo-700 font-bold rounded-full text-lg shadow-lg hover:bg-opacity-90 transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-75">
                Get Started Today
            </button>
            <p class="mt-4 text-sm opacity-75">No credit card required for 7-day trial.</p>
        </div>
    </div>
</body>
</html>
